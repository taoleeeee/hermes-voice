name: Build APK
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Accept licenses
      run: yes | sdkmanager --licenses
    - name: Install SDK components
      run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Debug APK
      run: set -o pipefail && ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
    - name: Upload build log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
    - name: Rename APK with version
      if: success()
      id: rename
      run: |
        VERSION="${GITHUB_REF_NAME}"
        APK_SRC="app/build/outputs/apk/debug/app-debug.apk"
        APK_DST="hermes-voice-${VERSION}.apk"
        cp "$APK_SRC" "$APK_DST"
        echo "apk_name=$APK_DST" >> "$GITHUB_OUTPUT"
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: hermes-voice-${{ github.ref_name }}
        path: ${{ steps.rename.outputs.apk_name }}
        retention-days: 90
    - name: Create Release with APK
      if: success() && startsWith(github.ref, 'refs/tags/v')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --repo "${{ github.repository }}" \
          --title "${{ github.ref_name }}" \
          --generate-notes \
          --fail-on-no-commits=false \
          ${{ steps.rename.outputs.apk_name }}
